name: Build OBS Plugins

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .gitignore
      - .envrc.template
      - scripts/**
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .gitignore
      - .envrc.template
      - scripts/**

jobs:
  cargo_fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check

  cargo_clippy:
    runs-on: ubuntu-latest
    env:
      DONT_USE_GENERATED_BINDINGS: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: Swatinem/rust-cache@v2

      - run: nix develop .#obs-v32 --command bash -c 'cargo clippy --workspace --all-targets --no-deps -- -D warnings'

  build_linux:
    name: build_linux (v${{ matrix.obs }})
    strategy:
      fail-fast: false
      matrix:
        obs: [30, 31, 32]
    runs-on: ubuntu-latest
    env:
      DONT_USE_GENERATED_BINDINGS: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: Swatinem/rust-cache@v2

      - name: build
        run: |
          nix develop .#obs-v${{ matrix.obs }} --command \
            cargo build --verbose --workspace \
              --no-default-features --features obs-${{ matrix.obs }}

      - name: test
        run: |
          nix develop .#obs-v${{ matrix.obs }} --command \
            cargo test --workspace --exclude avatar-plugin \
              --no-default-features --features obs-${{ matrix.obs }}

  build_macos:
    name: build_macos (v${{ matrix.obs_full_version }})
    strategy:
      fail-fast: false
      matrix:
        obs: [30, 31, 32]
        include:
          # Full release versions used to download the .dmg from
          # github.com/obsproject/obs-studio/releases. macOS doesn't have a
          # per-version package manager path that's as clean as choco/Nix, so
          # we mount the official DMG and copy OBS.app into /Applications,
          # which is where obs-sys/build_mac.rs already looks.
          - obs: 30
            obs_full_version: "30.2.3"
          - obs: 31
            obs_full_version: "31.1.2"
          - obs: 32
            obs_full_version: "32.1.2"
    runs-on: macos-latest
    env:
      DONT_USE_GENERATED_BINDINGS: "true"
      OBS_LIBRARY_MAJOR_VER: ${{ matrix.obs }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2

      - name: install OBS ${{ matrix.obs_full_version }}
        run: |
          set -euxo pipefail
          arch="$(uname -m)"
          # OBS ships separate arm64 and intel DMGs from 30.x onward.
          case "$arch" in
            arm64) suffix="macos-apple.dmg" ;;
            x86_64) suffix="macos-intel.dmg" ;;
            *) echo "unsupported arch: $arch"; exit 1 ;;
          esac
          url="https://github.com/obsproject/obs-studio/releases/download/${{ matrix.obs_full_version }}/obs-studio-${{ matrix.obs_full_version }}-${suffix}"
          curl -L -o /tmp/obs.dmg "$url"
          # Mount at a fixed path so we don't have to parse hdiutil's output
          # back out (the previous version mis-handled volume names that
          # contain spaces). Then glob for whatever .app the DMG ships —
          # release naming has varied between "OBS.app" and "OBS Studio.app".
          mount_dir="$(mktemp -d)"
          hdiutil attach -nobrowse -mountpoint "$mount_dir" /tmp/obs.dmg
          app_path="$(find "$mount_dir" -maxdepth 2 -name '*.app' -type d -print -quit)"
          if [ -z "$app_path" ]; then
            echo "no .app bundle found in $mount_dir — contents:"
            ls -la "$mount_dir"
            hdiutil detach "$mount_dir"
            exit 1
          fi
          sudo cp -R "$app_path" /Applications/OBS.app
          hdiutil detach "$mount_dir"

      - run: cargo build --verbose --workspace --exclude scroll-focus-filter --no-default-features --features obs-${{ matrix.obs }}
        env:
          DYLD_FALLBACK_FRAMEWORK_PATH: "/Applications/OBS.app/Contents/Frameworks"
          DYLD_FALLBACK_LIBRARY_PATH: "/Applications/OBS.app/Contents/Frameworks"

      - run: cargo test --workspace --exclude scroll-focus-filter --exclude avatar-plugin --no-default-features --features obs-${{ matrix.obs }}
        env:
          DYLD_FALLBACK_FRAMEWORK_PATH: "/Applications/OBS.app/Contents/Frameworks"
          DYLD_FALLBACK_LIBRARY_PATH: "/Applications/OBS.app/Contents/Frameworks"

  build_windows:
    name: build_windows (v${{ matrix.choco_version }})
    strategy:
      fail-fast: false
      matrix:
        obs: [30, 31, 32]
        include:
          # Pin choco to the same minor.patch our submodules are at where the
          # choco index has them. If a pinned version disappears from choco,
          # swap in a `gh release download` of the matching MSI from
          # github.com/obsproject/obs-studio.
          - obs: 30
            choco_version: "30.2.3"
          - obs: 31
            choco_version: "31.1.2"
          - obs: 32
            choco_version: "32.1.2"
    runs-on: windows-latest
    env:
      DONT_USE_GENERATED_BINDINGS: "true"
      OBS_LIBRARY_MAJOR_VER: ${{ matrix.obs }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2

      - name: install OBS ${{ matrix.choco_version }}
        shell: pwsh
        run: |
          choco install llvm -y --no-progress
          choco install obs-studio --version=${{ matrix.choco_version }} -y --no-progress

      - run: cargo build --verbose --workspace --exclude scroll-focus-filter --no-default-features --features obs-${{ matrix.obs }}

      - run: cargo test --workspace --exclude scroll-focus-filter --exclude avatar-plugin --no-default-features --features obs-${{ matrix.obs }}
